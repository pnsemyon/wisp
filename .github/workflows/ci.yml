name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: Core (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: |
          cargo fmt --all -- --check
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Clippy (core + engine + cli)
        run: cargo clippy -p wisp-core -p wisp-engine -p wisp-cli -- -D warnings
      - name: Test
        run: cargo test -p wisp-core -p wisp-engine -p wisp-cli

  windows-app:
    name: Windows app build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Fetch engine resources
        run: ./scripts/fetch-resources.ps1
        shell: pwsh
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
      - name: Build app
        run: cargo tauri build
